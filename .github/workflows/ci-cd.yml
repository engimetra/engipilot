# ================================================================
# ENGIPILOT — CI/CD Pipeline
# Recommandations encadreur :
#   1. Connexion SSH avec user dédié (pas root)
#   2. Scan des images Docker (Trivy)
#   3. Images stables et épinglées
# ================================================================
name: ENGIPILOT CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/engipilot

jobs:

  # ── Tests Backend Java ─────────────────────────────────────────
  test-backend:
    name: Tests Backend (Java 21 + Spring Boot 3.5)
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:17.2-alpine3.21       # ← Version épinglée
        env:
          POSTGRES_DB:       engipilot_test
          POSTGRES_USER:     admin
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd "pg_isready -U admin -d engipilot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Configuration Java 21 (Temurin LTS)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Lancer les tests Java
        working-directory: backend
        run: ./mvnw test -q
        env:
          SPRING_DATASOURCE_URL:      jdbc:postgresql://localhost:5432/engipilot_test
          SPRING_DATASOURCE_USERNAME: admin
          SPRING_DATASOURCE_PASSWORD: test_password
          JWT_SECRET:                 test_secret_key_minimum_32_characters_here!
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9099  # Kafka absent en test

      - name: Rapport de couverture JaCoCo
        working-directory: backend
        run: ./mvnw jacoco:report -q

      - name: Upload couverture (Codecov)
        uses: codecov/codecov-action@v4
        with:
          files: backend/target/site/jacoco/jacoco.xml
          flags: backend
        continue-on-error: true

  # ── Tests Frontend ─────────────────────────────────────────────
  test-frontend:
    name: Tests Frontend (Node.js 22 + Next.js 15)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Configuration Node.js 22 LTS        # ← Corrigé : 22, pas 20
        uses: actions/setup-node@v4
        with:
          node-version: '22'                       # ← 22 LTS Active
          cache: 'npm'

      - name: Activer pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Installer les dépendances
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Vérification TypeScript
        working-directory: frontend
        run: pnpm typecheck

      - name: Lancer les tests Vitest
        working-directory: frontend
        run: pnpm test

  # ── Tests Service IA ───────────────────────────────────────────
  test-ia:
    name: Tests IA (Python 3.11 + FastAPI)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Configuration Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer les dépendances Python
        working-directory: ia
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lancer les tests Pytest
        working-directory: ia
        run: python -m pytest tests/ -v --tb=short

  # ── Build et Scan des Images Docker ────────────────────────────
  build-and-scan:
    name: Build + Scan des vulnérabilités (Trivy)
    needs: [test-backend, test-frontend, test-ia]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
      security-events: write    # Pour uploader les rapports de sécurité

    steps:
      - uses: actions/checkout@v4

      # ── Build des images ──────────────────────────────────────
      - name: Build image Backend
        run: |
          docker build \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            -t ${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }} \
            -t ${{ env.IMAGE_PREFIX }}/backend:latest \
            ./backend

      - name: Build image IA
        run: |
          docker build \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            -t ${{ env.IMAGE_PREFIX }}/ia:${{ github.sha }} \
            -t ${{ env.IMAGE_PREFIX }}/ia:latest \
            ./ia

      - name: Build image Frontend
        run: |
          docker build \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            -t ${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }} \
            -t ${{ env.IMAGE_PREFIX }}/frontend:latest \
            -f ./frontend/Dockerfile.prod \
            ./frontend

      # ── Scan Trivy — Image Backend ───────────────────────────
      - name: Scan Trivy — Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'          # Fail le pipeline si CVE critique trouvée
          ignore-unfixed: true     # Ignorer les CVE sans correctif disponible

      - name: Upload rapport Trivy Backend
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-backend.sarif'
          category: 'trivy-backend'

      # ── Scan Trivy — Image IA ─────────────────────────────────
      - name: Scan Trivy — IA Service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/ia:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-ia.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload rapport Trivy IA
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-ia.sarif'
          category: 'trivy-ia'

      # ── Scan Trivy — Image Frontend ───────────────────────────
      - name: Scan Trivy — Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload rapport Trivy Frontend
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-frontend.sarif'
          category: 'trivy-frontend'

      # ── Scan également le code source ────────────────────────
      - name: Scan Trivy — Fichiers de configuration
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'          # Non bloquant pour la config

      # ── Push vers le registry (seulement sur main) ────────────
      - name: Login au registry GitHub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images vers registry
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}
          docker push ${{ env.IMAGE_PREFIX }}/backend:latest
          docker push ${{ env.IMAGE_PREFIX }}/ia:${{ github.sha }}
          docker push ${{ env.IMAGE_PREFIX }}/ia:latest
          docker push ${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
          docker push ${{ env.IMAGE_PREFIX }}/frontend:latest

  # ── Déploiement sur DigitalOcean Droplet (user dédié, pas root) ─
  deploy:
    name: Déploiement DigitalOcean Droplet (user dédié, pas root)
    needs: [build-and-scan]
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Déployer sur Droplet via SSH (user engipilot, PAS root)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: engipilot                        # ← User dédié, PAS root
          key:      ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port:     22
          script: |
            set -e
            echo "[INFO] Connexion établie avec l'utilisateur $(whoami)"
            echo "[INFO] Déploiement ENGIPILOT depuis $(pwd)"

            cd ~/app

            # Pull du code
            git fetch origin main
            git reset --hard origin/main

            # Login registry GitHub (images buildées par CI)
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

            # Mise à jour images depuis ghcr.io
            GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }} \
              docker compose -f docker-compose.prod.yml pull

            # Restart avec zéro downtime
            GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }} \
              docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Vérification santé backend
            sleep 30
            curl -sf http://localhost:8080/actuator/health || \
              (echo "[ERROR] Backend unhealthy!" && exit 1)

            echo "[INFO] Déploiement réussi — $(date)"

  # ── Résumé de sécurité ─────────────────────────────────────────
  security-summary:
    name: Résumé sécurité
    needs: [build-and-scan]
    runs-on: ubuntu-22.04
    if: always()
    steps:
      - name: Résumé
        run: |
          echo "## Résumé Sécurité ENGIPILOT"
          echo ""
          echo "| Composant | Scan Trivy | Statut |"
          echo "|-----------|-----------|--------|"
          echo "| Backend   | CVE CRITICAL+HIGH | ${{ needs.build-and-scan.result }} |"
          echo "| IA Service| CVE CRITICAL+HIGH | ${{ needs.build-and-scan.result }} |"
          echo "| Frontend  | CVE CRITICAL+HIGH | ${{ needs.build-and-scan.result }} |"
