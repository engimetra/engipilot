global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: engipilot-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['backend:8080']
        labels: { service: backend }

  - job_name: engipilot-ia
    static_configs:
      - targets: ['ia-service:8001']
        labels: { service: ia }
