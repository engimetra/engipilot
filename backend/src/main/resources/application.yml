spring:
  application:
    name: engipilot-backend

  datasource:
    url:      ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/engipilot}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    hikari:
      maximum-pool-size:    30        # 20 → 30 pour absorber les pics de trafic
      minimum-idle:         10        # 5  → 10 connexions toujours prêtes
      connection-timeout:   20000     # 30s → 20s — fail-fast sous charge
      idle-timeout:         600000
      max-lifetime:         1800000   # 30 min — évite les connexions périmées
      leak-detection-threshold: 10000 # Log si une connexion n'est pas libérée en 10s

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway gère le schéma — Hibernate ne doit pas le modifier
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect:                  org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 50          # 25 → 50 — réduit les requêtes N+1
        jdbc.batch_size:          50          # Inserts/updates en batch
        order_inserts:            true
        order_updates:            true
        generate_statistics:      false       # Désactivé en prod
        cache:
          use_second_level_cache:  true
          use_query_cache:         true
          region.factory_class:    org.hibernate.cache.jcache.JCacheRegionFactory

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  data:
    redis:
      host:     ${REDIS_HOST:localhost}
      port:     ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:engipilot_redis}
      timeout:  1500ms              # 2000 → 1500ms — fail-fast Redis
      lettuce:
        pool:
          max-active:   16
          max-idle:     8
          min-idle:     2
          max-wait:     1000ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer:   org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks:             1
      compression-type: snappy       # Compresse les messages Kafka
      batch-size:       16384
      linger-ms:        5
    consumer:
      group-id:          engipilot-backend
      auto-offset-reset: earliest
      key-deserializer:   org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.engipilot.*"
        fetch.min.bytes:              1024
        fetch.max.wait.ms:            500

  cache:
    type: redis
    redis:
      time-to-live: 300000           # 60s → 5 min pour les KPIs (données stables)
    cache-names:
      - kpis
      - projets
      - chantiers
      - utilisateurs
      - lots

# JWT — JWT_SECRET OBLIGATOIRE en production (≥ 32 caractères)
jwt:
  secret:        ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# MinIO
minio:
  endpoint:   ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin123}
  bucket:     engipilot-documents

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,flyway,caches
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha

server:
  port: ${BACKEND_PORT:8080}
  compression:
    enabled:        true
    mime-types:     application/json,application/xml,text/html,text/plain,text/css,application/javascript
    min-response-size: 1024          # Compresse uniquement si > 1 KB
  http2:
    enabled: true                    # HTTP/2 pour multiplexing
  tomcat:
    accept-count:             200
    max-connections:          8192
    threads:
      max:  200
      min-spare: 20
    connection-timeout:       20000

logging:
  level:
    com.engipilot:             INFO
    org.springframework.security: WARN
    org.hibernate.SQL:         WARN
    com.zaxxer.hikari:         WARN
