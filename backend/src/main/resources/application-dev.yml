# Surcharges profil DEV — activé par SPRING_PROFILES_ACTIVE=dev
# Ces valeurs écrasent application.yml uniquement en environnement de développement.

spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    # En dev, afficher le détail des migrations appliquées
    out-of-order: true

logging:
  level:
    com.engipilot:                  DEBUG
    org.springframework.security:   DEBUG
    org.springframework.web:        DEBUG
    org.hibernate.SQL:              DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.zaxxer.hikari:              INFO

management:
  endpoint:
    health:
      show-details: always   # Détails visibles en dev sans auth
