# ENGIPILOT — docker-compose.yml
# Toutes les images sont épinglées à des versions stables précises
# pour éviter les régressions et les vulnérabilités des images "latest"
# Utiliser : docker compose up -d  (PAS docker-compose)

services:

  postgres:
    image: postgres:17.2-alpine3.21        # ← Version précise, pas :17-alpine
    container_name: engipilot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-engipilot}
      POSTGRES_USER:     ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-engipilot_dev}
      APP_DB_USER:       ${APP_DB_USER:-engipilot_app}
      APP_DB_PASSWORD:   ${APP_DB_PASSWORD:-engipilot_app_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/01_create_app_user.sh:/docker-entrypoint-initdb.d/01_create_app_user.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d engipilot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    security_opt:
      - no-new-privileges:true             # ← Sécurité : pas d'escalade de privilèges

  redis:
    image: redis:7.4.2-alpine3.21          # ← Version précise
    container_name: engipilot-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-engipilot_redis}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-engipilot_redis}", "ping"]
      interval: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    security_opt:
      - no-new-privileges:true

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.6  # ← Version précise
    container_name: engipilot-zk
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk_data:/var/lib/zookeeper/data
      - zk_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
    security_opt:
      - no-new-privileges:true

  kafka:
    image: confluentinc/cp-kafka:7.5.6      # ← Version précise
    container_name: engipilot-kafka
    restart: unless-stopped
    depends_on:
      zookeeper: { condition: service_healthy }
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 30s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z  # ← Version épinglée, pas :latest
    container_name: engipilot-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: engipilot/backend:latest
    container_name: engipilot-backend
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      kafka:    { condition: service_healthy }
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL:          jdbc:postgresql://postgres:5432/engipilot
      APP_DB_USER:                    ${APP_DB_USER:-engipilot_app}
      APP_DB_PASSWORD:                ${APP_DB_PASSWORD:-engipilot_app_dev}
      POSTGRES_USER:                  ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD:              ${POSTGRES_PASSWORD:-engipilot_dev}
      SPRING_DATA_REDIS_HOST:         redis
      SPRING_DATA_REDIS_PASSWORD:     ${REDIS_PASSWORD:-engipilot_redis}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET:      ${JWT_SECRET:-dev_secret_key_minimum_32_chars_change_me!}
      MINIO_ENDPOINT:   http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768M
    security_opt:
      - no-new-privileges:true
    read_only: false

  ia-service:
    build:
      context: ./ia
      dockerfile: Dockerfile
    image: engipilot/ia:latest
    container_name: engipilot-ia
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      kafka:    { condition: service_healthy }
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL:            postgresql+asyncpg://admin:${POSTGRES_PASSWORD:-engipilot_dev}@postgres:5432/engipilot
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      IA_DEBUG:                "false"
    volumes:
      - ./ia/models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: engipilot/frontend:latest
    container_name: engipilot-frontend
    restart: unless-stopped
    depends_on:
      backend: { condition: service_healthy }
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL:     http://localhost:8080/api/v1
      NEXT_PUBLIC_IA_URL:      http://localhost:8001
      NEXT_PUBLIC_WS_URL:      ws://localhost:8080/ws
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./frontend/src:/app/src:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health 2>/dev/null || wget -qO- http://localhost:3000 2>/dev/null | grep -q '<html' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:1.27.3-alpine3.20          # ← Version précise
    container_name: engipilot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend: { condition: service_healthy }
      backend:  { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/api/v1/actuator/health 2>/dev/null || wget -qO- http://localhost 2>/dev/null | grep -q '<html' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 64M
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus:v2.55.1           # ← Version précise, pas :latest
    container_name: engipilot-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana:11.4.0            # ← Version précise, pas :latest
    container_name: engipilot-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  redis_data:
  zk_data:
  zk_log:
  kafka_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: engipilot-network
