# docker-compose.apps.yml
# Build et lance : backend Spring Boot, IA Python, Frontend Next.js, Nginx
# Prérequis : docker compose -f docker-compose.infra.yml up -d (infra déjà lancée)
# PostgreSQL tourne en natif Windows → accessible via host.docker.internal:5432
# Usage : docker compose -f docker-compose.apps.yml up -d --build

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: engipilot/backend:latest
    container_name: engipilot-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://host.docker.internal:5432/engipilot
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      REDIS_HOST:                 engipilot-redis
      REDIS_PORT:                 "6379"
      REDIS_PASSWORD:             engipilot_redis
      KAFKA_BOOTSTRAP_SERVERS:    kafka:29092
      MINIO_ENDPOINT:             http://engipilot-minio:9000
      MINIO_ACCESS_KEY:           minioadmin
      MINIO_SECRET_KEY:           minioadmin123
      JWT_SECRET:                 ${JWT_SECRET:-dev_secret_key_minimum_32_chars_change_me!}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    security_opt:
      - no-new-privileges:true

  ia-service:
    build:
      context: ./ia
      dockerfile: Dockerfile
    image: engipilot/ia:latest
    container_name: engipilot-ia
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL:            postgresql+asyncpg://postgres:password@host.docker.internal:5432/engipilot
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      IA_DEBUG:                "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./ia/models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: engipilot/frontend:latest
    container_name: engipilot-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL:     http://localhost:8080/api/v1
      NEXT_PUBLIC_IA_URL:      http://localhost:8001
      NEXT_PUBLIC_WS_URL:      ws://localhost:8080/ws
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./frontend/src:/app/src:ro
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:1.27.3-alpine3.20
    container_name: engipilot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [frontend, backend]
    security_opt:
      - no-new-privileges:true

networks:
  default:
    name: engipilot-network
    external: true
