version: "3.9"

services:

  # ─── DATABASE ────────────────────────────────────────────────────
  postgres:
    image: postgres:17.2-alpine3.21
    container_name: engipilot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-engipilot}
      POSTGRES_USER:     ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      APP_DB_USER:       ${APP_DB_USER:-engipilot_app}
      APP_DB_PASSWORD:   ${APP_DB_PASSWORD}
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=128MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=50
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/01_create_app_user.sh:/docker-entrypoint-initdb.d/01_create_app_user.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-engipilot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── REDIS ───────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: engipilot-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── ZOOKEEPER ───────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.6
    container_name: engipilot-zk
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    volumes:
      - zk_data:/var/lib/zookeeper/data
      - zk_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep -q Mode"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── KAFKA ───────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.6
    container_name: engipilot-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── MINIO ───────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: engipilot-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── BACKEND (SPRING BOOT) ───────────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: engipilot-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:          jdbc:postgresql://postgres:5432/${POSTGRES_DB:-engipilot}
      APP_DB_USER:                    ${APP_DB_USER:-engipilot_app}
      APP_DB_PASSWORD:                ${APP_DB_PASSWORD}
      POSTGRES_USER:                  ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD:              ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST:         redis
      SPRING_DATA_REDIS_PASSWORD:     ${REDIS_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET:                     ${JWT_SECRET}
      MINIO_ENDPOINT:                 http://minio:9000
      MINIO_ACCESS_KEY:               ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY:               ${MINIO_SECRET_KEY:-minioadmin123}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health 2>/dev/null | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ─── IA SERVICE ──────────────────────────────────────────────────
  ia-service:
    build:
      context: ./ia
    container_name: engipilot-ia
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${APP_DB_USER:-engipilot_app}:${APP_DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-engipilot}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── FRONTEND (NEXT.JS) ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: engipilot-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL:     https://engipilot.ma/api/v1
      NEXT_PUBLIC_IA_URL:      https://engipilot.ma/ia
      NEXT_PUBLIC_WS_URL:      wss://engipilot.ma/ws
      NEXT_TELEMETRY_DISABLED: "1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/landing 2>/dev/null | grep -q '<html' || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 120s

  # ─── NGINX (REVERSE PROXY) ───────────────────────────────────────
  nginx:
    image: nginx:1.27.3-alpine3.20
    container_name: engipilot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost 2>/dev/null | grep -q '<html' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  zk_data:
  zk_log:
  kafka_data:
  minio_data:
  certbot_webroot:
  certbot_certs:
