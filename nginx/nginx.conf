events { worker_connections 1024; }
http {
  upstream backend  { server backend:8080; }
  upstream frontend { server frontend:3000; }
  upstream ia       { server ia-service:8001; }
  server {
    listen 80;
    server_name localhost;
    location /api/v1/ { proxy_pass http://backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /ia/      { proxy_pass http://ia; rewrite ^/ia/(.*)$ /$1 break; }
    location /         { proxy_pass http://frontend; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }
  }
}
