events {
    worker_connections 1024;
}

http {

    # IMPORTANT: noms doivent matcher docker-compose
    upstream backend {
        server backend:8080;
    }

    upstream frontend {
        server frontend:3000;
    }

    upstream ia {
        server engipilot-ia:8001;
    }

    # =========================
    # HTTP -> HTTPS redirect
    # =========================
    server {
        listen 80;
        server_name engipilot.ma www.engipilot.ma;

        return 301 https://$host$request_uri;
    }

    # =========================
    # HTTPS SERVER
    # =========================
    server {
        listen 443 ssl http2;
        server_name engipilot.ma www.engipilot.ma;

        ssl_certificate /etc/letsencrypt/live/engipilot.ma/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/engipilot.ma/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        client_max_body_size 50M;

        # FRONTEND
        location / {
            proxy_pass http://frontend;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # BACKEND API
        location /api/v1/ {
            proxy_pass http://backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # IA SERVICE
        location /ia/ {
            proxy_pass http://ia;

            rewrite ^/ia/(.*)$ /$1 break;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}