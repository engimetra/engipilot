events {
  worker_connections 1024;
}

http {

  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  proxy_connect_timeout 60s;
  proxy_send_timeout    60s;
  proxy_read_timeout    60s;
  client_max_body_size  50m;

  upstream backend  { server backend:8080;    }
  upstream frontend { server frontend:3000;   }
  upstream ia       { server ia-service:8001; }

  # HTTP uniquement — utilisé AVANT l'obtention des certificats SSL
  # Après setup-ssl.sh, remplacer par nginx.prod.conf
  server {
    listen 80;
    server_name engipilot.ma www.engipilot.ma;

    # Challenge Let's Encrypt
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location /api/ {
      proxy_pass       http://backend;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
    }

    location /ia/ {
      proxy_pass       http://ia/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
    }
  }
}
