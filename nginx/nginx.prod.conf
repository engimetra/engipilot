events {
  worker_connections 1024;
}

http {

  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  gzip on;

  upstream backend  { server backend:8080; }
  upstream frontend { server frontend:3000; }
  upstream ia       { server ia-service:8001; }

  server {
    listen 80;
    server_name engipilot.ma www.engipilot.ma;

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name engipilot.ma www.engipilot.ma;

    ssl_certificate     /etc/letsencrypt/live/engipilot.ma/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/engipilot.ma/privkey.pem;

    location /api/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location /ia/ {
      proxy_pass http://ia;
    }

    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
    }
  }
}