events { worker_connections 1024; }

http {
  # ── Timeouts & buffers ────────────────────────────────────────
  proxy_connect_timeout       60s;
  proxy_send_timeout          60s;
  proxy_read_timeout          60s;
  client_max_body_size        50m;

  # ── Upstreams ─────────────────────────────────────────────────
  upstream backend  { server backend:8080; }
  upstream frontend { server frontend:3000; }
  upstream ia       { server ia-service:8001; }
  upstream grafana  { server grafana:3000; }

  # ── HTTP → HTTPS redirect ─────────────────────────────────────
  server {
    listen 80;
    server_name engipilot.ma www.engipilot.ma;

    # Challenge Let's Encrypt (certbot webroot)
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS principal ───────────────────────────────────────────
  server {
    listen 443 ssl;
    http2 on;
    server_name engipilot.ma www.engipilot.ma;

    # Certificats Let's Encrypt (générés par setup-ssl.sh)
    ssl_certificate     /etc/letsencrypt/live/engipilot.ma/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/engipilot.ma/privkey.pem;

    # Paramètres SSL recommandés
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # ── Headers sécurité ──────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           DENY                                  always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # ── API Backend ───────────────────────────────────────────
    location /api/v1/ {
      proxy_pass         http://backend;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket (Spring Boot) ───────────────────────────────
    location /ws {
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
    }

    # ── Actuator (interne uniquement) ────────────────────────
    location /actuator {
      allow 127.0.0.1;
      deny  all;
      proxy_pass http://backend;
    }

    # ── Service IA ────────────────────────────────────────────
    location /ia/ {
      proxy_pass         http://ia/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Grafana (accès restreint) ─────────────────────────────
    location /grafana/ {
      proxy_pass         http://grafana/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend Next.js ──────────────────────────────────────
    location / {
      proxy_pass         http://frontend;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
    }
  }
}
