events {
  worker_connections 1024;
}

http {

  # ==============================
  # CONFIG GÉNÉRALE
  # ==============================
  proxy_connect_timeout 60s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;
  client_max_body_size 50m;

  # ==============================
  # UPSTREAMS (SERVICES DOCKER)
  # ==============================
  upstream backend {
    server backend:8080;
  }

  upstream frontend {
    server frontend:3000;
  }

  upstream ia {
    server ia-service:8001;
  }

  # ==============================
  # HTTP → HTTPS
  # ==============================
  server {
    listen 80;
    server_name engipilot.ma www.engipilot.ma;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ==============================
  # HTTPS SERVER PRINCIPAL
  # ==============================
  server {
    listen 443 ssl http2;
    server_name engipilot.ma www.engipilot.ma;

    ssl_certificate     /etc/letsencrypt/live/engipilot.ma/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/engipilot.ma/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # ==============================
    # API BACKEND
    # ==============================
    location /api/ {
      proxy_pass http://backend:8080/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==============================
    # WEBSOCKET
    # ==============================
    location /ws {
      proxy_pass http://backend:8080;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    # ==============================
    # IA SERVICE
    # ==============================
    location /ia/ {
      proxy_pass http://ia:8001/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==============================
    # FRONTEND (FIX 404 PRINCIPAL)
    # ==============================
    location / {
      proxy_pass http://frontend:3000;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Next.js / React support
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
